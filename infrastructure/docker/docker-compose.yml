services:
  postgres:
    image: postgres:16-alpine
    container_name: agent-skills-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: skills_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skills_db"]
      interval: 5s
      timeout: 5s
      retries: 10


volumes:
  postgres_data:

